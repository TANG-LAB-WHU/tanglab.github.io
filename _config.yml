title: "TANG LAB @ WHU"
description: "AI-driven and simulation-informed research for sustainable materials, molecular systems, and circular resource technologies."
url: "https://tanglab.github.io"
baseurl: ""

email: "itanggroup@gmail.com"
github: "https://github.com/TANG-LAB-WHU"

markdown: kramdown
permalink: /news/:year/:month/:day/:title/

defaults:
  - scope:
      path: ""
    values:
      layout: default
  - scope:
      path: "pages"
    values:
      layout: page
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
