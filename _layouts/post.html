---
layout: default
---
<article class="post">
  <header class="page-hero">
    <div class="container">
      <p class="eyebrow">News</p>
      <h1>{{ page.title }}</h1>
      <p class="post-meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
      </p>
    </div>
  </header>
  <section class="section">
    <div class="container content post-content">
      {{ content }}
    </div>
  </section>
</article>
