<header class="site-header">
  <div class="container nav-wrap">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img class="brand-logo" src="{{ '/assets/img/logos/Tang_Lab_logo.jpg' | relative_url }}" alt="Lab Logo">
      <span class="brand-text">{{ site.data.site.group_name }}</span>
    </a>
    <nav class="nav" aria-label="Primary navigation">
      {% for item in site.data.navigation %}
        {% assign nav_title = item[0] %}
        {% assign nav_url = item[1] %}
        <a href="{{ nav_url | relative_url }}"{% if page.url == nav_url %} aria-current="page"{% endif %}>{{ nav_title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
