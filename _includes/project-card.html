<article class="project-card" data-category="{{ project.category | slugify }}">
  <img src="{{ project.image | relative_url }}" alt="{{ project.title }} project placeholder image">
  <div class="project-card-body">
    <div class="project-meta">
      <span>{{ project.funder }}</span>
      <span>{{ project.period }}</span>
    </div>
    <h3>{{ project.title }}</h3>
    <p>{{ project.short_description }}</p>
    <div class="tag-row" aria-label="Project tags">
      {% for tag in project.tags %}
        <span>{{ tag }}</span>
      {% endfor %}
    </div>
    <div class="card-actions">
      <span class="badge highlight" style="background: var(--soft-teal); color: var(--brand-dark); padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: 500;">{{ project.status }}</span>
      <a class="button secondary small" href="{{ '/projects/' | append: '#' | append: project.id | relative_url }}" style="margin-left: auto;">Learn more</a>
    </div>
  </div>
</article>
