principal_investigator:
  - name: "Dr. Siqi Tang"
    role: "Research Associate Professor"
    affiliation: "School of Resource and Environmental Sciences, Wuhan University"
    image: "/assets/img/people/Tang_Image.jpg"
    email: "siqit@outlook.com"
    website: ""
    google_scholar: "https://scholar.google.com/citations?user=3khMcpsAAAAJ"
    github: ""
    # research_interests:
    #   - "AI for Science"
    #   - "Molecular simulation"
    #   - "Sustainable materials"
    #   - "Waste valorization"
    bio: "Dr. Siqi Tang is a tenured Research Associate Professor at the School of Resource and Environmental Sciences, Wuhan University, joining in March 2026. He received his Ph.D. in Mechanics (Energy and Resources Engineering) and M.S. in Environmental Engineering from Peking University, and his B.S. in Environmental Engineering from Northwest Normal University. Dr. Tang has accumulated rich research experience through postdoctoral and researcher appointments at the University of Illinois Urbana-Champaign (UIUC), Peking University, and Nanyang Technological University (NTU). His research focuses on Physics-intrinsic Artificial Intelligence (PI-AI) to advance circular resource and sustainable engineering science, leveraging machine learning-accelerated molecular dynamics (MLIP-AIMD), generative deep learning, and advanced materials design. He is the PI of an NSFC Young Scientists Fund project, and has been recognized as an Outstanding Doctoral Graduate of Peking University as well as a recipient of the prestigious Tang Xiaoyan Environmental Science Innovation Award."

