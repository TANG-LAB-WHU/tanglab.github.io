  - name: "Yi Li"
    last_name: "Li"
    role: "PhD Student"
    affiliation: "Peking University"
    image: "/assets/img/people/PhD_YILI.jpg"
    email: "2501112425@stu.pku.edu.cn"
    website: ""
    google_scholar: ""
    github: "https://github.com/lyly0227"
    research_interests:
      - "MLIP-AIMD"
      - "Phosphogypsum utilization"
      - "LCA/TEA"
      - "CO₂ capture"
    bio: "I am a first-year Ph.D. student (Fall 2025) in the College of Environmental Sciences and Engineering at Peking University, co-advised by Prof. Zhenshan Li (Peking University) and Prof. Siqi Tang (Wuhan University). I received my Bachelor's degree from the College of Civil Engineering at Hefei University of Technology, and my Master's degree from the School of Civil Engineering at Shandong University. My current research leverages machine learning, ab initio molecular dynamics (AIMD), and theoretical computations to accelerate experimental research, aiming to discover breakthrough technologies for the high-value utilization and resource recycling of phosphogypsum."

