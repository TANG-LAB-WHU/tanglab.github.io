intro: >
  TANG LAB welcomes motivated students and collaborators interested in Physics-Intrinsic AI (PI-AI),
  circular resource and sustainable engineering science, molecular simulation, sustainable materials, and
  environmental decision-making. Students with backgrounds in mechanics, chemistry, material physics, materials science, environmental
  engineering, machine learning, data science, applied mathematics, or related fields are
  encouraged to reach out. Students from ethnic minority backgrounds or economically disadvantaged regions who are passionate about scientific research are particularly encouraged to contact us.
sections:
  - title: "Prospective PhD Students"
    status: "Admissions pathway"
    description: >
      Prospective PhD students should proactively contact Dr. Tang in advance to inquire about
      available enrollment quotas. When reaching out, applicants must explicitly articulate how
      their personal research interests align with the lab's directions.
      Candidates with experience in molecular simulation, physics-informed machine learning, scientific computing,
      sustainability assessment, materials innovation engineering, interfacial mechanics, or environmental systems
      are especially encouraged to connect their background to specific lab projects. <strong>We particularly
      welcome applicants with a solid foundation in mathematics and physics, alongside strong programming skills.
      Furthermore, we highly value individuals who are proactive with strong execution skills, articulate in
      communication and presentation, committed to cultivating independent problem-solving abilities, and
      resilient with an optimistic mindset</strong>.
  - title: "Master's Students"
    status: "Research fit encouraged"
    description: >
      Master's students interested in sustained research projects are welcome to contact the lab.
      Strong fits include students interested in AIMD/MD workflows, AI for materials, LCA/TEA,
      interpretable modeling, or circular-economy technologies. We focus on training and improving
      applicants' overall capabilities, with particular emphasis on cultivating the ability to identify
      and solve problems, communication and expression skills (including academic presentations),
      and personal mindset resilience. <strong>Applicants must have a clear goal for joining the group and
      explicitly state which specific project in the lab they wish to engage with when reaching out</strong>.
  - title: "Undergraduate Researchers"
    status: "Consistent commitment"
    description: >
      Undergraduate students can contribute to literature review, data analysis, visualization,
      software development, and reproducible research workflows. Students should be ready to
      commit consistent time and learn research tools. <strong>Undergraduates can engage in graduate-level research training, and are encouraged and mentored to apply for the NSFC Basic Research Program for Young Students (Undergraduate)</strong>.
  - title: "Visiting Students and Collaborators"
    status: "Collaboration welcome"
    description: >
      The lab welcomes visiting students, scholars, and research collaborations across Physics-Intrinsic AI (PI-AI),
      molecular simulation (AIMD/MD/MLIPs), sustainability assessment (LCA/TEA), circular resource chemistry, and
      bioenergy modeling. We are particularly open to joint efforts in open-source scientific software, model development,
      and integrating computational tools with experimental chemistry/engineering.
  - title: "Postdoctoral Research Associate"
    status: "Positions Available"
    full_width: true
    description: >
      We are actively seeking highly motivated Postdoctoral Research Associates to lead projects in Physics-Intrinsic AI, molecular simulation, or sustainable materials engineering. Ideal candidates should possess a strong publication record, deep expertise in their respective fields, and the ability to mentor junior lab members. We offer a highly collaborative environment, competitive compensation, and robust support for career development and independent grant applications. <strong>Outstanding candidates are highly encouraged to apply for the Wuhan University Hongyi Postdoctoral Program first; if awarded, the lab's compensation package will be stacked cumulatively. Postdoctoral openings are dynamically published based on the lab's project funding availability, so please stay tuned for updates.</strong>
contact:
  title: "How to Contact Us"
  description: >
    Please include your CV, transcript if relevant, a short description of your research interests (one page),
    and one specific TANG LAB project or repository that connects to your background and interests. <strong>For
    postdoctoral applicants, please particularly highlight your systematic research achievements and core academic vision.</strong>
  button_text: "Welcome to reach out to Dr. Tang"
  email: "sqitang@whu.edu.cn"
