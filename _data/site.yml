home_research_cards:
  - title: "Theme 1: MLIP-Driven Super Phosphorus Fertilizer Manufacturing"
    description: "Guided by the principle of atomic-level precision design, we engineer super phosphorus fertilizers as smart nanocargos to intelligently deliver essential nutrients throughout the entire plant lifecycle, advancing climate-resilient and sustainable agriculture."
  - title: "Theme 2: AI-Accelerated CO₂ Mineralization"
    description: "We combine AIMD, Physics-Intrinsic AI, and materials modeling to uncover artificially accelerated CO₂ mineralization mechanisms and discover novel artificial microstructures within complex material families."
  - title: "Theme 3: Phosphogypsum Upcycling"
    description: "We pioneer AI-enabled sustainable engineering approaches to convert phosphogypsum from a global waste challenge into high-value circular resource systems."
  - title: "Theme 4: MLIPs and Atomistic Simulation"
    description: "We construct advanced molecular dynamics workflows and machine learning interatomic potentials (MLIPs) that bridge microscopic atomistic insights with scalable predictive modeling."
  - title: "Theme 5: Dynamic Stochastic LCA/TEA"
    description: "We deploy dynamic stochastic life-cycle and techno-economic modeling to rigorously quantify and mitigate uncertainties for robust, sustainability-oriented technology decisions."
  - title: "Theme 6: Interpretable AI for Bioenergy"
    description: "We apply transparent, interpretable deep neural networks to decode complex pyrolysis processes and optimize renewable bioenergy feedstock utilization."
  - title: "Theme 7: Molecular Network Topology"
    description: "We develop topology-based analytical methods to decode complex hydrogen-bond networks and matter interactions at the fundamental molecular level."
