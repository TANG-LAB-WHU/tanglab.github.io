home_research_cards:
  - title: "AI-Accelerated CO₂ Mineralization"
    description: "We combine AIMD, machine learning, and materials modeling to study artificially accelerated CO₂ mineralization on HAP material families."
  - title: "Phosphogypsum Upcycling"
    description: "We develop AI-enabled approaches for converting phosphogypsum from a global waste challenge into opportunities for circular resource systems."
  - title: "Molecular Dynamics and Interatomic Potentials"
    description: "We build simulation workflows and molecular-dynamics tools that connect atomistic insights with scalable predictive modeling."
  - title: "LCA/TEA and Decision Support"
    description: "We integrate life-cycle assessment, techno-economic analysis, uncertainty, and risk modeling for sustainability-oriented technology decisions."
  - title: "Interpretable AI for Bioenergy"
    description: "We apply interpretable deep learning to pyrolysis processes and renewable bioenergy feedstock optimization."
  - title: "Molecular Network Topology"
    description: "We develop topology-based methods and tools for analyzing hydrogen-bond networks and molecular structures."
