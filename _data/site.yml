tagline: "Physics-Intrinsic AI (PI-AI) for circular resource and sustainable engineering science"
hero_summary: >
  TANG LAB at Wuhan University leverages Physics-Intrinsic Artificial Intelligence (PI-AI) to advance
  circular resource and sustainable engineering science. To address the pressing environmental, technological,
  and governance-cost challenges facing global sustainable development, our research thrives on deep vertical
  and horizontal cross-disciplinary integration. We seamlessly connect atomistic simulation, machine intelligence,
  and dynamic stochastic LCA/TEA to quantify and mitigate uncertainties in sustainable engineering, thereby accelerating real-world
  solutions for carbon mineralization, phosphogypsum upcycling, renewable bioenergy, and broader circular-economy
  technologies.
research_vision: >
  From atoms to systems, TANG LAB connects molecular-scale simulation with system-level
  sustainability engineering design and deployment. We study how materials and molecular processes behave, how
  machine-learning models can accelerate discovery, and how emerging technologies may perform
  environmentally, economically, and socially. We deeply integrate cutting-edge artificial intelligence with
  theoretical computations of material interactions to accelerate the efficiency and quality of experimental
  research, constructing a novel, transparent PI-AI framework to investigate both the macroscopic and microscopic
  realms of matter.
