tagline: "Physics-Intrinsic AI (PI-AI) for circular resource and sustainable engineering science"
hero_summary: >
  TANG LAB at Wuhan University leverages Physics-Intrinsic Artificial Intelligence (PI-AI) to advance
  circular resource and sustainable engineering science. Our work connects atomistic simulation, machine
  learning, molecular dynamics, LCA/TEA, and interpretable modeling to accelerate real-world solutions for
  carbon mineralization, phosphogypsum upcycling, renewable bioenergy, and circular-economy technologies.
research_vision: >
  From atoms to systems, TANG LAB connects molecular-scale simulation with system-level
  sustainability assessment. We study how materials and molecular processes behave, how
  machine-learning models can accelerate discovery, and how emerging technologies may perform
  environmentally, economically, and socially.
